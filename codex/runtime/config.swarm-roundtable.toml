# Exported from ~/.codex/config.toml
# Scope: [features], [agents], and [agents.*] sections related to multi-agent runtime
[features]
plan_tool = true
view_image_tool = true
streamable_shell = false
rmcp_client = true
skills = true
parallel = true
unified_exec = true
shell_snapshot = true
steer = true
collaboration_modes = true
multi_agent = true

[agents]
max_threads = 14
max_depth = 2
job_max_runtime_seconds = 1800

[agents.product_manager]
description = "Product Manager role for PRD, scope, and prioritization"
config_file = "agents/role-product-manager.toml"

